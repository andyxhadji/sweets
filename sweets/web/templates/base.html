<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweets - Vestaboard Control</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        h1 {
            color: #fff;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(22, 1fr);
            gap: 3px;
            background: #000;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .cell {
            aspect-ratio: 1;
            background: #1a1a1a;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
        }
        .cell.filled {
            background: #fff;
            color: #000;
        }
        .cell.color-63 { background: #ff0000; }
        .cell.color-64 { background: #ff8000; }
        .cell.color-65 { background: #ffff00; color: #000; }
        .cell.color-66 { background: #00ff00; color: #000; }
        .cell.color-67 { background: #0000ff; }
        .cell.color-68 { background: #8000ff; }
        .cell.color-69 { background: #ffffff; color: #000; }
        .cell.color-70 { background: #000000; }
        .section {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .section h2 {
            margin-top: 0;
            color: #fff;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #333;
            color: #fff;
            margin-bottom: 10px;
        }
        button, select {
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button {
            background: #4a9eff;
            color: #fff;
        }
        button:hover {
            background: #3a8eef;
        }
        button.danger {
            background: #ff4a4a;
        }
        button.danger:hover {
            background: #ef3a3a;
        }
        select {
            background: #333;
            color: #fff;
            border: 1px solid #444;
        }
        .status {
            font-size: 14px;
            color: #aaa;
        }
        .status strong {
            color: #4a9eff;
        }
        .inline-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>
<body>
    <h1>Sweets</h1>
    {% block content %}{% endblock %}
</body>
</html>
